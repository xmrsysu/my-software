name: Build Mac App Bundle

on: 
  push:
    branches: [ main ]  # 当你向 main 分支提交代码时触发

jobs:
  build-macos:
    runs-on: macos-latest  # 租用 GitHub 的苹果服务器
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Run PyInstaller
        run: |
          # 如果你有图标文件 icon.ico，PyInstaller 在 Mac 下通常需要 icns
          # 这里简单处理，直接打包。如果报错，请检查文件名
          pyinstaller --noconsole --windowed --onefile --name "QuadrantNote" your_script.py

      - name: Compress App
        run: |
          # Mac 的 .app 实际上是个文件夹，必须压缩后才能下载
          cd dist
          zip -r QuadrantNote_Mac.zip QuadrantNote.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: My-Mac-App-Result
          path: dist/QuadrantNote_Mac.zip
