name: Build Mac App Bundle

on: 
  push:
    branches: [ main ] 

jobs:
  build-macos:
    runs-on: macos-latest  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyinstaller

      - name: Run PyInstaller
        run: |
          # 请确保 your_script.py 替换为你仓库里真实的 py 文件名
          pyinstaller --noconsole --windowed --onefile --name "QuadrantNote" main.py

      - name: Compress App
        run: |
          cd dist
          zip -r QuadrantNote_Mac.zip QuadrantNote.app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/QuadrantNote_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
